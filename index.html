<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <meta name="description" content="Sign in to your Acme account." />
  <title>Sign in — Acme</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="auth">
    <section class="auth-card" aria-labelledby="auth-title">
      <a href="#" class="brand" aria-label="Acme — home">
        <svg class="brand-mark" width="28" height="28" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
          <rect x="4" y="4" width="14" height="14" fill="currentColor" opacity="0.35" />
          <rect x="14" y="14" width="14" height="14" fill="currentColor" />
        </svg>
        <span class="brand-name">acme<span class="brand-cursor">_</span></span>
      </a>

      <header class="auth-header">
        <p class="auth-eyebrow">// authentication</p>
        <h1 id="auth-title">Welcome back.</h1>
        <p class="auth-subtitle">Sign in to continue to your workspace.</p>
      </header>

      <form class="auth-form" action="#" method="post">
        <div class="field">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="username"
            inputmode="email"
            placeholder="you@example.com"
            spellcheck="false"
            autocapitalize="off"
          />
        </div>

        <div class="field">
          <div class="field-row">
            <label for="password">Password</label>
            <a class="field-link" href="#">Forgot?</a>
          </div>
          <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
            minlength="8"
            placeholder="at least 8 characters"
          />
        </div>

        <button class="btn-primary" type="submit">Sign in &rarr;</button>
      </form>

      <p class="auth-alt">
        New here? <a href="#">Create an account</a>
      </p>
    </section>

    <footer class="auth-foot">
      <p>&copy; 2026 acme &middot; <a href="#">terms</a> &middot; <a href="#">privacy</a></p>
    </footer>
  </main>
</body>
</html>
